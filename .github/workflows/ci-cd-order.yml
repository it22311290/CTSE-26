name: CI/CD Pipeline - Order Service

on:
  push:
    branches: [main, develop, development]
    paths:
      - "order-service/**"
  pull_request:
    branches: [main]
    paths:
      - "order-service/**"
  workflow_dispatch: # Allows manual triggering from the Actions tab

env:
  IMAGE_NAME: order-service
  PORT: 3003

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./order-service/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint || true
      - name: Run tests
        run: npm test

  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --project-name=order-service
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./order-service
          args: >
            -Dsonar.projectKey=ecommerce-order-service
            -Dsonar.organization=${{ secrets.SONAR_ORG }}

  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          # Use the variable directly; no need to export it as an output
          FULL_IMAGE_NAME=${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          docker build -t $FULL_IMAGE_NAME ./order-service
          docker tag $FULL_IMAGE_NAME ${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:latest
          docker push $FULL_IMAGE_NAME
          docker push ${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ env.IMAGE_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          # FIX: Reconstruct the image path here instead of using job outputs
          imageToDeploy: ${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          targetPort: ${{ env.PORT }}
          environmentVariables: >
            PORT=${{ env.PORT }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }}
            PRODUCT_SERVICE_URL=${{ secrets.PRODUCT_SERVICE_URL }}
            PAYMENT_SERVICE_URL=${{ secrets.PAYMENT_SERVICE_URL }}
