name: CI/CD Pipeline - Order Service

on:
  push:
    branches: [main, develop]
    paths:
      - "order-service/**"
  pull_request:
    branches: [main]
    paths:
      - "order-service/**"
  workflow_dispatch: # Allows manual triggering

env:
  IMAGE_NAME: order-service
  PORT: 3003

jobs:
  test:
    # ... (Keep your existing test/lint steps)

  security-scan:
    # ... (Keep your existing security-scan steps)

  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    # FIX: Run on push OR manual trigger
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    outputs:
      # Mapping the step output to the job output
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        id: build-image
        run: |
          IMAGE_TAG=${{ github.sha }}
          # FIX: Use vars.ACR_URL instead of secrets to prevent masking/skipping
          FULL_IMAGE_NAME=${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG

          docker build -t $FULL_IMAGE_NAME ./order-service
          docker tag $FULL_IMAGE_NAME ${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:latest
          docker push $FULL_IMAGE_NAME
          docker push ${{ vars.ACR_URL }}/${{ env.IMAGE_NAME }}:latest

          # FIX: Export the image path clearly
          echo "image=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    # FIX: Run on push OR manual trigger
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ env.IMAGE_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          # This will now receive the value because it's no longer skipped
          imageToDeploy: ${{ needs.build-and-push.outputs.image }}
          targetPort: ${{ env.PORT }}
