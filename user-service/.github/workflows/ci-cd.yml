# GitHub Actions CI/CD Pipeline Documentation

# PURPOSE:
# This workflow automates the continuous integration and continuous deployment
# for the User Service microservice. It runs on push/PR events to specific branches,
# performs testing, security scanning, builds a Docker image, and deploys to Azure Container Apps.

# TRIGGERS:
# - Push events to 'main' and 'develop' branches (when user-service/** paths change)
# - Pull requests to 'main' branch (when user-service/** paths change)

# WORKFLOW STAGES:

# 1. TEST & LINT JOB:
#    - Checks out code
#    - Sets up Node.js v20 with npm caching
#    - Installs dependencies
#    - Runs ESLint/code linting (non-blocking)
#    - Executes test suite
#    - Uploads coverage reports to Codecov (non-blocking)

# 2. SECURITY SCAN JOB:
#    - Runs after test job completes
#    - Executes Snyk SAST security scanning for vulnerabilities
#    - Performs SonarCloud code quality analysis
#    - Both scans are non-blocking (continue-on-error: true)

# 3. BUILD & PUSH JOB:
#    - Runs after test and security-scan jobs (only on main branch push)
#    - Authenticates to Azure Container Registry (ACR)
#    - Builds Docker image from ./user-service directory
#    - Tags image with git commit SHA and 'latest'
#    - Pushes image to ACR
#    - Outputs image reference for deployment job

# 4. DEPLOY JOB:
#    - Runs after build-and-push job (only on main branch push)
#    - Authenticates to Azure subscription
#    - Deploys updated image to Azure Container Apps
#    - Exposes service on port 3001

# REQUIRED GITHUB SECRETS (must be configured in repository settings):
#   - SNYK_TOKEN: Snyk API token for security scanning
#   - SONAR_TOKEN: SonarCloud authentication token
#   - SONAR_ORG: SonarCloud organization identifier
#   - ACR_USERNAME: Azure Container Registry username
#   - ACR_PASSWORD: Azure Container Registry password
#   - AZURE_CREDENTIALS: Azure service principal credentials (JSON format)
#   - GITHUB_TOKEN: Automatically provided by GitHub Actions

# REQUIRED ENVIRONMENT VARIABLES (already configured):
#   - AZURE_CONTAINER_REGISTRY: ecommerceacr
#   - ACR_REGISTRY: ecommerceacr.azurecr.io
#   - IMAGE_NAME: user-service
#   - CONTAINER_APP_NAME: user-service
#   - RESOURCE_GROUP: ecommerce-rg
#   - CONTAINER_APP_ENV: ecommerce-env
name: CI/CD Pipeline - User Service

on:
  push:
    branches: [main, develop]
    paths:
      - "user-service/**"
  pull_request:
    branches: [main]
    paths:
      - "user-service/**"

env:
  AZURE_CONTAINER_REGISTRY: ecommerceacr
  ACR_REGISTRY: ecommerceacr.azurecr.io
  IMAGE_NAME: user-service
  CONTAINER_APP_NAME: user-service
  RESOURCE_GROUP: ecommerce-rg
  CONTAINER_APP_ENV: ecommerce-env

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./user-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Run tests
        run: npm test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          directory: ./user-service/coverage
          flags: user-service
        continue-on-error: true

  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --project-name=user-service

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./user-service
          args: >
            -Dsonar.projectKey=ecommerce-user-service
            -Dsonar.organization=${{ secrets.SONAR_ORG }}

  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build, tag, and push Docker image to ACR
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG ./user-service
          docker tag $ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG $ACR_REGISTRY/$IMAGE_NAME:latest
          docker push $ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_REGISTRY/$IMAGE_NAME:latest
          echo "image=$ACR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.AZURE_CONTAINER_REGISTRY }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.image }}
          targetPort: 3001
